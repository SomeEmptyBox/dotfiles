general {
    border_size = 3 # 1
    no_border_on_floating = no
    gaps_in = 4
    gaps_out = 10 # 20
    gaps_workspaces = 0
    col.inactive_border = 0xff444444
    col.active_border = 0xffffffff
    col.nogroup_border = 0xffffaaff
    col.nogroup_border_active = 0xffff00ff
    layout = dwindle
    no_focus_fallback = no
    apply_sens_to_raw = no
    resize_on_border = yes
    extend_border_grab_area = 15
    hover_icon_on_border = yes
    allow_tearing = no
    resize_corner = 0
}
decoration {
    rounding = 5 # 0
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0
    drop_shadow = no
    shadow_range = 4
    shadow_render_power = 3
    shadow_ignore_window = yes
    col.shadow = 0xee1a1a1a
    shadow_offset = 0 0
    shadow_scale = 1.0
    dim_inactive = no
    dim_strength = 0.5
    dim_special = 0.2
    dim_around = 0.4
    # screen_shader = []

    blur {
        enabled = no
        size = 1
        passes = 1
        ignore_opacity = yes
        new_optimizations = yes
        xray = no
        noise = 0.0117
        contrast = 0.8916
        brightness = 0.8172
        vibrancy = 0.1696
        vibrancy_darkness = 0.0
        special = no
        popups = yes
        popups_ignorealpha = 0.2
    }
}
animations {
    enabled = yes
    first_launch_animation = yes

    bezier = mybez, 0.05, 0.9, 0.1, 1.0

    animation = windows, 1, 7, default
        # animation = windowsIn, 1, 10, default
        # animation = windowsOut, 1, 10, default
        # animation = windowsMove, 1, 10, default
    animation = layers, 1, 7, default
        # animation = layersIn, 1, 7, default
        # animation = layersOut, 1, 7, default
    animation = fade, 1, 7, default
        # animation = fadeIn, 1, 7, default
        # animation = fadeOut, 1, 7, default
        # animation = fadeSwitch, 1, 7, default
        # animation = fadeShadow, 1, 7, default
        # animation = fadeDim, 1, 7, default
        # animation = fadeLayers, 1, 7, default
            # animation = fadeLayersIn, 1, 7, default
            # animation = fadeLayersOut, 1, 7, default
    animation = border, 1, 7, default
    animation = borderangle, 1, 7, default
    animation = workspaces, 1, 7, default
        # animation = specialWorkspace, 1, 6, default
}
